# NIXI SBC — development configuration (default for `cargo run`)

[general]
name = "SBC-Dev"
instance_id = "sbc-dev-01"

[network]
public_ipv4 = "127.0.0.1"

# Only UDP listener for development
[[network.listeners]]
transport = "UDP"
bind_address = "127.0.0.1"
bind_port = 5060

[media]
rtp_port_range = [10000, 10100]
rtcp_enabled = true
transcoding_threads = 2
codecs = ["PCMU", "PCMA"]

[media.webrtc]
enabled = false
stun_servers = []
turn_enabled = false

[database]
sqlite_path = "data/sbc-dev.db"

[security]
rate_limit_global = 100
rate_limit_per_ip = 10
auth_challenge_timeout = 30

[management]
api_enabled = true
api_bind_address = "127.0.0.1"
api_port = 8080

[metrics]
prometheus_enabled = true
prometheus_bind_address = "127.0.0.1"
prometheus_port = 9090
