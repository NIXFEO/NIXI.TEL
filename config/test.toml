# NIXI SBC — test configuration

[general]
name = "SBC-Test"
instance_id = "sbc-test-01"

[network]
public_ipv4 = "127.0.0.1"

# UDP listener on non-standard port for testing
[[network.listeners]]
transport = "UDP"
bind_address = "127.0.0.1"
bind_port = 15060

[media]
rtp_port_range = [20000, 20100]
rtcp_enabled = true
transcoding_threads = 2
codecs = ["PCMU", "PCMA"]

[media.webrtc]
enabled = false
stun_servers = []
turn_enabled = false

[database]
sqlite_path = "data/sbc-test.db"

[security]
rate_limit_global = 100
rate_limit_per_ip = 10
auth_challenge_timeout = 30

[management]
api_enabled = true
api_bind_address = "127.0.0.1"
api_port = 18080

[metrics]
prometheus_enabled = true
prometheus_bind_address = "127.0.0.1"
prometheus_port = 19090
